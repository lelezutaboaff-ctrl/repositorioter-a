<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfólio</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    
    <header>
        <h1 class="nome">Letícia Araújo</h1>

        <nav>
            <a href="#" onclick="trocarConteudo(
                'Home',
            )">INTERESSE 1</a>

            <a href="#" onclick="trocarConteudo(
                'Sobre',
            )">INTERESSE 2</a>

            <a href="#" onclick="trocarConteudo(
                'Sair',
            )">INTERESSE 3</a>
        </nav>
    </header>

  
    <main class="inicio">

        <div class="texto-intro">
            <h2 id="titulo">
                Olá! Meu nome é Leticia Araujo
            </h2>

            <p id="paragrafo">
                'Atualmente curso Desenvolvimento de sistemas no senac,tenho 17 anos, gosto de esportes, quase moro na fisioterapia. '
            </p>
        </div>

        <div class="foto-container">
            <img 
                src="https://i.pinimg.com/736x/16/b6/3c/16b63c7f53a557fb69fb6a2d3ec80090.jpg"
                alt="foto" 
                class="foto"
            />
        </div>

    </main>

    <script>

        function trocarConteudo(titulo, texto) {

            document.getElementById("titulo").innerText = titulo;

            document.getElementById("paragrafo").innerText = texto;
        }

    </script>

</body>
</html>
